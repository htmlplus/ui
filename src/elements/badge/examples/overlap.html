<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body rtl>
    <plus-stack gap="1rem">
      <plus-badge dot overlap="circular">
        <plus-avatar shape="circle"></plus-avatar>
      </plus-badge>
      <plus-badge dot overlap="rectangular">
        <plus-avatar shape="round"></plus-avatar>
      </plus-badge>
      <plus-badge dot overlap="rectangular">
        <plus-avatar shape="tile"></plus-avatar>
      </plus-badge>
    </plus-stack>
    <script type="module">
      import 'https://esm.run/@htmlplus/ui/avatar.js';
      import 'https://esm.run/@htmlplus/ui/badge.js';
      import 'https://esm.run/@htmlplus/ui/stack.js';
    </script>
  </body>
</html>
