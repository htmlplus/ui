<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body>
    <plus-stack gap="1rem">
      <plus-avatar shape="circle">
        <plus-badge appearance="contrast" dot placement="inline" slot="end-bottom"></plus-badge>
      </plus-avatar>
      <plus-badge appearance="contrast" dot overlap="circular" placement="bottom-end">
        <plus-avatar shape="circle"></plus-avatar>
      </plus-badge>
    </plus-stack>
    <script type="module">
      import 'https://esm.run/@htmlplus/ui/avatar.js';
      import 'https://esm.run/@htmlplus/ui/badge.js';
      import 'https://esm.run/@htmlplus/ui/stack.js';
    </script>
  </body>
</html>
