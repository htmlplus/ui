<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body>
    <p data-doc>Open the developer console.</p>
    <plus-center>
      <plus-signature id="$signature"></plus-signature>
    </plus-center>
    <br />
    <plus-stack gap="0.5rem">
      <button type="button" id="$toDataURL">To Data URL</button>
      <button type="button" id="$toSVG">To SVG</button>
      <button type="button" id="$getValue">Get Value</button>
    </plus-stack>
    <script type="module">
      import 'https://esm.run/@htmlplus/ui/center.js';
      import 'https://esm.run/@htmlplus/ui/signature.js';
      import 'https://esm.run/@htmlplus/ui/stack.js';

      $toDataURL.addEventListener('click',  ( ) => {
        console.log($signature.toDataURL());
      });

      $toSVG.addEventListener('click',  ( ) => {
        console.log($signature.toSVG());
      });

      $getValue.addEventListener('click',  ( ) => {
        console.log($signature.value);
      });
    </script>
  </body>
</html>
