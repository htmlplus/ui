<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      plus-animation {
        background: lightgray;
        width: 100px;
        height: 100px;
      }
    </style>
  </head>
  <body>
    <p data-doc>
      The <code>name</code> property accepts any string by default. 
      Extending the <code>PlusAnimationOverrides</code> interface refines it to <code>'fade-in'</code> and <code>'fade-out'</code>, 
      improving type safety and IntelliSense.
    </p>
    <plus-center>
      <plus-animation iterations="Infinity" name="fade-in" run></plus-animation>
    </plus-center>
    <script type="text/typescript">
      declare module '@htmlplus/ui' {
        interface PlusAnimationOverrides {
          name: 'fade-in' | 'fade-out';
        }
      }
      export {};
    </script>
    <script type="module">
      import 'https://esm.run/@htmlplus/ui/animation.js';
      import 'https://esm.run/@htmlplus/ui/center.js';
    </script>
  </body>
</html>
